# Dev overrides for `coredge-monitoring/helm/promtail` chart.
# Defaults live in `coredge-monitoring/helm/promtail/values.yaml`.

fullnameOverride: promtail

daemonset:
  enabled: true

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

image:
  registry: docker.io
  repository: coredgeio/promtail
  tag: "2.9.3"
  pullPolicy: IfNotPresent
