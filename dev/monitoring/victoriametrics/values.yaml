global:
  victoriametrics:
    enabled: true
  vmauth:
    enabled: true
  vmagent:
    enabled: true

# victoriametrics — deploys a VMCluster CRD instance
# The victoria-metrics-operator (from victoriaoperator chart) must be running first.
#
# Generated services by operator (based on metadata.name = fullnameOverride below):
#   vmselect-victoriametrics:8481  (query endpoint)
#   vminsert-victoriametrics:8480  (write endpoint)
#   vmstorage-victoriametrics:8482 (storage endpoint)

enabled: true

# Operator creates services: vmselect-<name>, vminsert-<name>, vmstorage-<name>
fullnameOverride: "victoriametrics"

spec:
  retentionPeriod: "30d"
  vminsert:
    replicaCount: 1
    image:
      repository: docker.io/coredgeio/vminsert
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  vmselect:
    replicaCount: 1
    image:
      repository: docker.io/coredgeio/vmselect
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  vmstorage:
    replicaCount: 1
    image:
      repository: docker.io/coredgeio/vmstorage
      pullPolicy: IfNotPresent
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    storage:
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

nodePortInsert: 30480
nodePortSelect: 30481