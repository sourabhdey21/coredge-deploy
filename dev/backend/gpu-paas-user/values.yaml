# Default values for gpu-paas-user
replicaCount: 1

image:
  repository: docker.io/akashsharma2401/user-service
  pullPolicy: Always
  tag: "update-create-tenant-2"

nameOverride: ""
fullnameOverride: "gpu-paas-user"

environment: dev

labels:
  app: gpu-paas-user
  environment: dev

deployment:
  progressDeadlineSeconds: 60
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%

service:
  type: NodePort
  ports:
    - name: default
      port: 3000
      targetPort: 3000
      protocol: TCP
    - name: grpc
      port: 3001
      targetPort: 3001
      protocol: TCP
    - name: listen
      port: 80
      targetPort: 8000
      protocol: TCP

container:
  ports:
    - containerPort: 3000
      protocol: TCP
  resources: {}
  terminationMessagePath: /dev/termination-log
  terminationMessagePolicy: File

pod:
  automountServiceAccountToken: false
  dnsPolicy: ClusterFirst
  restartPolicy: Always
  schedulerName: default-scheduler
  securityContext: {}
  terminationGracePeriodSeconds: 30

# ConfigMap values
configMap:
  user_app_env: "development"
  user_host_grpc: "dev-gpu-paas-user-service"
  user_log_level: "debug"
  user_new_relic_app_name: "dev-gpu-paas-user"
  user_node_env: "development"
