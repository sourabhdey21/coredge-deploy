# postgres - airtel dev
# copied from ccs-helm-charts

global:
  ## Override for PostgresDB architecture
  ## global.postgresql.architecture.standalone Set to 'false' deploys a postgresql as a cluster with High Availability
  ## global.postgresql.architecture.standalone Set to 'true' deploys postgresql in standalone mode with no High Availability
  #

  # repository from where the controller images are pulled for controller
  repository: &repository coredgeio
  imagePullPolicy: &imagePolicy Always
  imagePullSecrets: []
  storageClass: &storageClass "local-path"

  postgresql:
    architecture:
      standalone: true
    ### Config override to use external Postgres
    ### This will not deploy postgresql with ccp
    external:
      host: ""
      port: ""
      user: ""
      database: ""
      password: ""

  ## Config override for AuditDB Postgres server details
  auditdb:
    host: ''
    port: ''
    database: ''
    username: ''
    password: ''

## Postgresql HA Configuration
## Deploys a postgresql cluster in HA configuration
## Requires Zalando Operator running on the cluster or in the same namespace
postgresqlHA:
  image: docker.io/coredgeio/spilo-16:3.2-p3
  ## Support PG Versions: 12 - 16
  ## Input only Major Version
  pgVersion: '15'
  maxconnections: "300"
  ## Database user and password configuration
  creds:
    user: 'ccs'
    pass: 'ccsdbadmin'
  ## No. of postgres cluster nodes.
  ## Minimum 3 for HA. Must be Odd number
  replicaCount: '1'
  ## Postgres LoadBalancer override
  loadBalancer:
    master: false
    replica: false
  ## Persistent Volume size override
  volume:
    size: 10Gi
  ## Postgres resources configuration override
  resources:
    requests:
      cpu: 10m
      memory: 100Mi
    limits:
      cpu: 500m
      memory: 500Mi
  ## Postgres pg_hba configuration override
  pg_hba: []
    # - hostssl all             all          0.0.0.0/0                md5
    # - host    all             all          0.0.0.0/0                md5
    # - hostssl all             all          0.0.0.0/0                trust
    # - host    all             all          0.0.0.0/0                trust
  ## Enable postgres & patroni metrics
  monitoring:
    enabled: false

## Postgresql Operator configuration
## This operator will manage the lifecycle of the above postgresql cluster
postgres-operator:
  enabled: true
  registry: docker.io
  repository: coredgeio/postgres-operator
  tag: v1.12.2
  pullPolicy: "IfNotPresent"
  configMajorVersionUpgrade:
    # "off": no upgrade, "manual": manifest triggers action, "full": minimal version violation triggers too
    major_version_upgrade_mode: "off"
    # upgrades will only be carried out for clusters of listed teams when mode is "off"
    minimal_major_version: "12"
    target_major_version: "16"
  configKubernetes:
    enable_cross_namespace_secret: false
    enable_sidecars: true
    # storage resize strategy, available options are: ebs, pvc, off or mixed
    storage_resize_mode: pvc
    watched_namespace: "*"  # listen to all namespaces
    # toggles pod anti affinity on the Postgres pods
    enable_pod_antiaffinity: false
    # override topology key for pod anti affinity
    pod_antiaffinity_topology_key: "kubernetes.io/hostname"
  configConnectionPooler:
    # docker image
    connection_pooler_image: "docker.io/coredgeio/pgbouncer:master-32"
    # max real PG backend connections PgBouncer holds — raised to match 1500-realm startup burst
    # (3 KC pods × 600 max Agroal = 1800 JDBC; 2000 gives 2× headroom in transaction mode)
    connection_pooler_max_db_connections: 2000
  resources:
    limits:
      cpu: 400m
      memory: 500Mi
    requests:
      cpu: 100m
      memory: 250Mi
  serviceAccount:
    name: "postgresql-operator"

## Postgresql HA cluster Configuration
pgcluster:
  ## Postgresql cluster name prefix
  name: "keycloak"
  image: docker.io/coredgeio/spilo-16:3.2-p3
  ## Support PG Versions: 12 - 16
  ## Input only Major Version
  postgresVersion: 15
  ## No. of postgres cluster nodes.
  ## Minimum 3 for HA. Must be Odd number
  replica: "3"
  ## Postgres LoadBalancer override
  loadBalancer:
    master: false
    replica: false
  ## Postgres configuration override parameters.
  configurationOverride:
    ## PgBouncer holds up to 2000 real PG connections (connection_pooler_max_db_connections).
    ## 3000 gives headroom above PgBouncer peak + patroni, monitoring, ops connections.
    maxConnections: "3000"
    ## statement_timeout in ms. 60s kills runaway queries fast.
    ## Previous value (600000 ms = 10 min) masked slow queries and kept connections open.
    statementTimeout: "60000"
    ## idle_in_transaction_session_timeout in ms. KC holds a JTA transaction open while
    ## acquiring the Infinispan computeSerialized lock (pure Java, no SQL). With 680 realms,
    ## expandCompositeRoles does ~14280 sequential SQL queries taking ~170s. Waiting threads
    ## are idle-in-transaction during this time. Must be > defaultTimeout (300s) so PG
    ## does not kill connections before JTA completes the cache warmup.
    idleInTransactionSessionTimeout: "310000"
    ## 25% of 32Gi pod RAM. Entire KC dataset (500 realms, 7k clients, roles) fits many times over.
    ## With all hot data in shared_buffers, 500 concurrent cold-cache queries become memory reads,
    ## not disk reads — query time drops from 10-30s to <100ms, well under any transaction timeout.
    sharedBuffers: "8GB"
    ## Tells the query planner that 24GB of memory is available for caching (shared_buffers + OS cache).
    ## Planner prefers index scans over sequential scans — critical for KC's point-lookup patterns.
    effectiveCacheSize: "24GB"
    ## Per-operation sort/hash memory. Speeds up the multi-table JOINs KC uses for role resolution.
    workMem: "32MB"
    ## Allow PG to parallelize large queries across 4 workers on the 15-CPU pod.
    maxParallelWorkersPerGather: "4"
    ## No per-statement logging — was the biggest disk I/O multiplier under load.
    ## Slow-query logging (log_min_duration_statement) is still active at the Patroni level.
    logStatement: "none"
  ## PgBouncer connection pooler (Zalando operator managed, transaction mode).
  ## When enabled=true, the operator deploys a PgBouncer Deployment and a
  ## <name>-postgresql-cluster-pooler Service. KC connects to the pooler; the
  ## pooler multiplexes to a small set of real PG backend processes.
  ## Must also set pgcluster.connectionPooler.enabled=true in keycloak-ha chart values.
  connectionPooler:
    enabled: true
    ## 7 PgBouncer instances for 1500-realm burst (was 5); 2000/7 = ~285 real PG connections/instance
    instances: "7"
    ## session mode: each KC JDBC connection maps to a dedicated PG backend for its lifetime.
    ## Required because KC/Hibernate keeps transactions open across multiple statements (idle in
    ## transaction). Transaction mode returns connections to the pool mid-transaction, causing
    ## other sessions to acquire the same PG backend and block on KC's row-level REALM locks.
    mode: "session"
  ## Persistent Volume size override
  volume:
    size: 10Gi
  ## 15 CPU: PostgreSQL can execute 500 concurrent queries in ~1-2s each (vs 10-30s on 4 CPU).
  ## This eliminates the JTA transaction timeout cascade triggered by orbiter's startup burst.
  ## 32Gi RAM: supports shared_buffers=8GB + OS page cache + working set without OOM risk.
  ## requests=limits for Guaranteed QoS — avoids OOM eviction during query bursts.
  resources:
    requests:
      cpu: "15"
      memory: "32Gi"
    limits:
      cpu: "15"
      memory: "32Gi"
  ## Tolerations for PostgreSQL pods — matches the dedicated=postgres:NoSchedule taint on DB nodes
  tolerations:
    - key: "dedicated"
      operator: "Equal"
      value: "infra"
      effect: "NoSchedule"
  ## Postgres pg_hba configuration override
  pg_hba: []
    # - hostssl all             all          0.0.0.0/0                md5
    # - host    all             all          0.0.0.0/0                md5
    # - hostssl all             all          0.0.0.0/0                trust
    # - host    all             all          0.0.0.0/0                trust
  ## Enable postgres & patroni metrics
  monitoring:
    enabled: true

## Enable and configure keycloak postgresql backup
## Currently only supported S3
pgbackup:
  enabled: false
  ## S3 configuration. Any S3 provider is supported
  s3:
    endpoint: ""
    bucket: ""
    prefix: ""
    accesskey: ""
    secretkey: ""
    ## Number of backups to retain in S3
    retainCount: ""
  ## Backup frequency/schedule
  schedule: "0 0 * * *"
  ## Persistence configuration for PVC used to store backup locally
  persistence:
    size: 10Gi
