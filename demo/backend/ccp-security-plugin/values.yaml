global:
  repository: &repository coredgeio
  releaseTag: &releaseTag latest
  imagePullPolicy: &imagePolicy Always
  storageClassName: ""

replicaCount: 1

image: 'ccp-security-plugin'

app:
  https_verify: False
  orbiter_metering_base_uri: "http://orbiter-metering:8081"
  orbiter_event_enabled: "true"
  https_verify: False
  ccp_core_host: "https://n1devcmp-user.ldev.com"
  ccp_core_vm_api_path: "/api/v2/computes/"
  ccp_core_host: "https://n1devcmp-user.dev.com"
  f5_enabled: "false"
  snow_enabled: "false"
  https_verify: False

  soc:
    secretName: "security-soc"
    userKey: ""
    passwordKey: ""
    # comma-separated list of flavor ids (reserved for SOC LC VM)
    flavor_ids: "1,2,3"

  resourcesFile:
    configMapName: "ccp-security-config"
    key: "resources.json"
    mountPath: "/etc/app/resources.json"

  waapAgreement:
    securityPvc: "ccp-security-pvc"
    waapSecret: "waap-agreement"
    fileName: "waap-agreement.pdf"
    mountPath: "/home/app/waap-agreement.pdf"

  mongoUrlOverride: "mongodb://sigma:pass@compass-configdb:27017"

  resources:
    limits:
      cpu: 400m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 200Mi

# HPA Configuration
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80
