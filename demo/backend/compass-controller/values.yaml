replicaCount:
  compassController: 1

global:
  repository: coredgeio
  imagePullPolicy: Always

  environment: ""
  dnsEnabled: true

  externalIP: "console.coredge.io"

  frontend:
    userPortal:
      domain: "console.coredge.io"
      nodePort: "32501"

  proxyProtocol:
    enabled: false

  controller:
    mtls:
      disabled: true

  mongodb:
    external:
      enabled: false
      configdb:
        host: ""
        port: ""
      metricsdb:
        host: ""
        port: ""
    globaldb:
      host: ""
      port: ""

controller:
  externalIP: "127.0.0.1"
  proxyIPs:
    - "127.0.0.1"
    - "::1"

resources: 
  limits:
    cpu: 3000m
    memory: 4Gi
  requests:
    cpu: 1500m
    memory: 2Gi

# HPA Configuration
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80