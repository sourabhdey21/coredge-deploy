apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: coredge-dev-frontend
  namespace: argocd
  labels:
    customer: coredge
    env: dev
    category: frontend
spec: 
  generators:
    - list:
        elements:
          - app: admin-portal
          - app: user-portal
          - app: mongo-express
          - app: pgadmin
          - app: service-registry-frontend
  template: 
    metadata: 
      name: '{{app}}-coredge-dev'
      namespace: argocd
      labels:
        customer: coredge
        env: dev
        category: frontend
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: coredge-dev
      # values repo first so it shows in argocd UI
      sources:
        - repoURL: https://github.com/sourabhdey21/coredge-deploy.git
          targetRevision: master
          ref: values
        - repoURL: https://github.com/sourabhdey21/ccs-helm-charts.git
          targetRevision: master
          path: helm/frontend-charts/{{app}}
          helm:
            valueFiles:
              - $values/dev/images.yaml
              - $values/dev/frontend/{{app}}/values.yaml
              - $values/dev/dev-small-cluster.yaml
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
