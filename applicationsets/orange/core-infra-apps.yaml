apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: orange-dev-core-infra
  namespace: argocd
  labels:
    customer: orange
    env: dev
    category: core-infra
spec: 
  generators:
    - list:
        elements:
          - app: mongodb
          - app: openfga
          - app: postgres
          - app: redis
          - app: keycloak-ha
  template: 
    metadata: 
      name: '{{app}}-orange-dev'
      namespace: argocd
      labels:
        customer: orange
        env: dev
        category: core-infra
      finalizers:
        - resources-finalizer.argocd.argoproj.io
    spec:
      project: default
      destination:
        server: https://kubernetes.default.svc
        namespace: orange-dev
      # values repo first so it shows in argocd UI
      sources:
        - repoURL: https://github.com/sourabhdey21/coredge-deploy.git
          targetRevision: master
          ref: values
        - repoURL: https://github.com/sourabhdey21/ccs-helm-charts.git
          targetRevision: master
          path: helm/core-infra-charts/{{app}}
          helm:
            valueFiles:
              - $values/orange/images.yaml
              - $values/orange/core-infra/{{app}}/values.yaml
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
