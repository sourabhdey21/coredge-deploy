  #Set this to true for environments without internet and update the proxy details
#  proxy:
#    enabled: false
#    http_proxy: ""
#    https_proxy: ""
#    no_proxy: "localhost,127.0.0.1,cluster.local,.svc,.svc.cluster.local"

  ## Configuration for exposing frontend URLs
  ## DNS hostnames considered only when global.dnsEnabled is 'true'
  ## Othwerwise NodePorts considered
  frontend:
    admin:
      domain: &adminDomain "admin-orange.coredge.io"
      tlsSecret: &adminTls "orange-dev-tls"
    userPortal:
      domain: &userDomain "console-orange.coredge.io"
      tlsSecret: &userTls "orange-dev-tls"
      nodePort: &frontendNodePort "32501"


nodeSelector: {} 

replicaCount: 1

allowedAdminUserDomain: ""

adminportal:
  image: "fluid-admin"
  service:
    nodePort: "32601"
  resources: 
    limits:
      cpu: 400m
      # memory: 128Mi
    requests:
      cpu: 100m
      memory: 200Mi
  ## Only use when https.enabled is set true
  ## Else leave empty
  ingress:
    tlsSecret: "orange-dev-tls"
    hostname: "admin-orange.coredge.io"
  ## Monitoring URLs
  monitoringURL: 
    resource: ""
    projectResource: ""
  ## Management URLs
  managementURL: 
    resource: ""
  ## Enabled Services
  enabledServices: "signup-approval,monitoring,subscription,service-catalog,quota-utilization,quota-package,admin-action-logs,admin-user,all-user,availability-zone,backup-provider,block-storage,compute,compute-availability-zone,compute-snapshot,flavors,images,network,network-availability-zone,object-storage-provider,organisation,project,provider,default-rule,region,resource-metrics,security-group,security-group-rule,subnets,storage-provider,volume-type,volume-availability-zone,volume-snapshot,quota-request,quota-list,default-quota,flavor-group,admin-access-logs,organisation-firewall,file-storage,object-storage,alert,vapt,soc,waap,idp"

