# neutron-service - coredge prod
# copied from ccs-helm-charts

global:
  # indicates usage of external ingress, currently also acts as a
  # switch to indicate use of domain configuration
  dnsEnabled: &dnsEnabled false

  # Ingress claas to be defined to Ingress configuration 
  ingressClass: &ingressClass ""

  # repository from where the controller images are pulled for
  # controller
  repository: &repository coredgeio

  # this field is considered only when UseDailyBuilds is set to be false
  # provides configuration of build tag to be used for container images
  releaseTag: &releaseTag latest
  
  # image pull policy to be used
  imagePullPolicy: &imagePolicy Always

  # external IP for controller, relevant, when domain is not
  # configured to allow generation of server certificate validity using
  # this IP address
  externalIP: &controllerIP 127.0.0.1

  # Flask Config (Development OR Production)
  # TEMPORARY
  flaskConfig: "production"

  events:
    enabled: false
      
  # Default application type: "ccp"
  application: "ccp"
  projectLabel: "" # value could be "Cell" in Airtel otherwise is null

nodeSelector: {} 

replicaCount: 1

image: "fluid_platform"

enabledServices: "networks,certificates,api,load_balancers"

resources:
  limits:
    cpu: 400m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 200Mi

# HPA configuration
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80


celery:
  enabled: true
  replicaCount: 1
  command: "celery -A app  worker --concurrency=2 --loglevel=debug -Q q_network"
  resources: 
    limits:
      cpu: 1000m
      memory: 6Gi
    requests:
      cpu: 100m
      memory: 2Gi

## Vault integration for certificate management
vault:
  url: ""
  token: ""
  kvPath: ""

nimLbaas:
  baseTemplateName: Consolidated_Base
  baseTemplateUid: ""
  coRobotsapiKey: ""
  coRobotsapiSecret: ""
  coRobotsapiUrl: ""
  coRobotsdomain: ""
  coRobotsproject: ""
  coRobotstemplateName: prometh-wf
  coRobotstemplateRemoveName: prometh-remove-wf
  augmentTemplateName: Consolidated_Augment
  augmentTemplateUid: ""
  lbComputeCreate: "true"
  lbAllowedStates: Created,Creating,Updating,Updated
  lbWorkflowMode: unknown
  management: management
  nginxDisk: ""
  nginxImage: ""
  nimHostIp: ""
  nim_username: ""
  nim_password: ""
  vip: vip
