# container-registry - core42 dev
# copied from ccs-helm-charts

global:
  # repository from where the controller images are pulled for
  # controller
  repository: &repository coredgeio

  # image pull policy to be used
  imagePullPolicy: &imagePolicy Always

  mongodb:
    external:
      enabled: false
      configdb:
        host: ""
        port: ""
        user: ""
        pass: ""
      metricsdb:
        host: ""
        port: ""
        user: ""
        pass: ""
    globaldb:
      host: ""
      port: ""
      user: ""
      pass: ""

replicaCount:
  containerRegistry: 1

clientMaxBodySize: 20G

storage:
  # prefix for bucket name for registries should be configured here
  # default prefix will be added if nothing is configured
  registryScopeMode: domain
  bucketPrefix: 
  s3:
    endpoint: http://10.10.40.16:8000
