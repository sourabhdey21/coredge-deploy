namespace: kube-system

schedule: "0 */6 * * *"

image:
  upload: peakcom/s5cmd
  etcd: docker.io/coredgeio/etcd:3.5.9-0

s3:
  enabled: false
  secretName: s3-credentials
  credentials:
    bucket: ""
    prefix: ""
    accessKeyId: ""
    secretAccessKey: ""
    endpointUrl: ""

retention:
  count: 12
  localDays: 2

pvc:
  size: 50Gi

nodeSelector:
  node-role.kubernetes.io/control-plane: ""

tolerations:
  - effect: NoSchedule
    operator: Exists
